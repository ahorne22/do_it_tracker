<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Weekly tasks" />
  <meta name="theme-color" content="#fafaf7" />
  <link rel="manifest" href="/assets/manifest-CWcF3s1T.json" />
  <title>Weekly tasks</title>
  <style>
    :root {
      --font-sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
      --color-background-primary: #ffffff;
      --color-background-secondary: #f3f3ef;
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #6b6b66;
      --color-text-tertiary: #9a9a93;
      --color-border-secondary: #d8d8d2;
      --color-border-tertiary: #ececea;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-background-primary: #1a1a1a;
        --color-background-secondary: #242422;
        --color-text-primary: #f0f0ec;
        --color-text-secondary: #a3a39c;
        --color-text-tertiary: #6b6b66;
        --color-border-secondary: #3a3a37;
        --color-border-tertiary: #2a2a28;
      }
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--color-background-secondary);
      color: var(--color-text-primary);
      font-family: var(--font-sans);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    #root { min-height: 100vh; }
    button { font-family: inherit; }
    input { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js" onerror="void 0"></script>

  <script type="text/babel" data-presets="react" data-type="module">
    const { useState, useEffect, useRef } = React;

    const DAYS = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];

    let auth = null, db = null;
    try {
      if (window.firebaseConfig && window.firebase) {
        if (!window.firebase.apps.length) window.firebase.initializeApp(window.firebaseConfig);
        auth = window.firebase.auth();
        db = window.firebase.firestore();
      }
    } catch (e) { console.warn('Firebase init failed:', e); }

    function getMonday(date) {
      const d = new Date(date);
      const day = d.getDay();
      const diff = (day === 0 ? -6 : 1 - day);
      d.setDate(d.getDate() + diff);
      d.setHours(0,0,0,0);
      return d;
    }

    function weekKey(monday) {
      return monday.toISOString().slice(0,10);
    }

    function formatWeekLabel(monday) {
      const end = new Date(monday);
      end.setDate(end.getDate() + 6);
      const fmt = d => d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
      return `${fmt(monday)} – ${fmt(end)}`;
    }

    const styles = {
      wrap: { fontFamily: "var(--font-sans)", padding: "1.5rem 1rem", maxWidth: 640, margin: "0 auto" },
      header: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "1.5rem" },
      h1: { fontSize: 20, fontWeight: 500, margin: 0, color: "var(--color-text-primary)" },
      weekLabel: { fontSize: 13, color: "var(--color-text-secondary)" },
      addRow: { display: "flex", gap: 8, marginBottom: "1.5rem" },
      input: { flex: 1, padding: "8px 12px", fontSize: 14, borderRadius: 8, border: "0.5px solid var(--color-border-secondary)", background: "var(--color-background-primary)", color: "var(--color-text-primary)", outline: "none" },
      numInput: { width: 60, padding: "8px 10px", fontSize: 14, borderRadius: 8, border: "0.5px solid var(--color-border-secondary)", background: "var(--color-background-primary)", color: "var(--color-text-primary)", outline: "none", textAlign: "center" },
      btn: { padding: "8px 16px", fontSize: 14, borderRadius: 8, border: "0.5px solid var(--color-border-secondary)", background: "transparent", color: "var(--color-text-primary)", cursor: "pointer" },
      card: { background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderRadius: 12, padding: "1rem 1.25rem", marginBottom: 12 },
      cardTop: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 },
      taskName: { fontSize: 15, fontWeight: 500, color: "var(--color-text-primary)", margin: 0 },
      target: { fontSize: 12, color: "var(--color-text-secondary)" },
      daysRow: { display: "flex", gap: 6, marginBottom: 10 },
      dayBtn: (checked, met) => ({
        width: 36, height: 36, borderRadius: 8, border: checked ? "none" : "0.5px solid var(--color-border-tertiary)",
        background: checked ? (met ? "#1D9E75" : "#378ADD") : "var(--color-background-secondary)",
        color: checked ? "#fff" : "var(--color-text-secondary)",
        fontSize: 12, fontWeight: checked ? 500 : 400, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center"
      }),
      progressWrap: { height: 4, borderRadius: 4, background: "var(--color-background-secondary)", overflow: "hidden" },
      progressBar: (pct, met) => ({ height: "100%", width: `${Math.min(100, pct)}%`, borderRadius: 4, background: met ? "#1D9E75" : "#378ADD", transition: "width 0.2s" }),
      progressLabel: { fontSize: 11, color: "var(--color-text-secondary)", marginTop: 4 },
      historySection: { marginTop: "2rem" },
      historyH2: { fontSize: 14, fontWeight: 500, color: "var(--color-text-secondary)", marginBottom: 12 },
      histRow: { display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: "0.5px solid var(--color-border-tertiary)", fontSize: 13 },
      dot: (met) => ({ width: 8, height: 8, borderRadius: "50%", background: met ? "#1D9E75" : "#888780", display: "inline-block", marginRight: 6 }),
      deleteBtn: { background: "none", border: "none", color: "var(--color-text-tertiary)", cursor: "pointer", fontSize: 16, padding: "0 4px" },
      empty: { fontSize: 14, color: "var(--color-text-secondary)", textAlign: "center", padding: "2rem 0" },
    };

    function App() {
      const today = new Date();
      const currentMonday = getMonday(today);
      const currentKey = weekKey(currentMonday);

      const [tasks, setTasks] = useState(() => {
        try { return JSON.parse(localStorage.getItem("wtt_tasks") || "[]"); } catch { return []; }
      });
      const [checks, setChecks] = useState(() => {
        try { return JSON.parse(localStorage.getItem("wtt_checks") || "{}"); } catch { return {}; }
      });
      const [history, setHistory] = useState(() => {
        try { return JSON.parse(localStorage.getItem("wtt_history") || "[]"); } catch { return []; }
      });

      const [newName, setNewName] = useState("");
      const [newTarget, setNewTarget] = useState(3);
      const [viewingHistory, setViewingHistory] = useState(false);

      const [user, setUser] = useState(null);
      const [syncStatus, setSyncStatus] = useState('idle');
      const skipNextSaveRef = useRef(false);
      const saveTimerRef = useRef(null);
      const userRef = useRef(null);

      useEffect(() => { localStorage.setItem("wtt_tasks", JSON.stringify(tasks)); }, [tasks]);
      useEffect(() => { localStorage.setItem("wtt_checks", JSON.stringify(checks)); }, [checks]);
      useEffect(() => { localStorage.setItem("wtt_history", JSON.stringify(history)); }, [history]);

      useEffect(() => {
        if (!auth) return;
        return auth.onAuthStateChanged(async (u) => {
          userRef.current = u;
          setUser(u);
          if (u) {
            try {
              const doc = await db.collection('users').doc(u.uid).get();
              if (doc.exists) {
                const data = doc.data();
                skipNextSaveRef.current = true;
                setTasks(data.tasks || []);
                setChecks(data.checks || {});
                setHistory(data.history || []);
                setSyncStatus('synced');
              } else {
                const t = JSON.parse(localStorage.getItem("wtt_tasks") || "[]");
                const c = JSON.parse(localStorage.getItem("wtt_checks") || "{}");
                const h = JSON.parse(localStorage.getItem("wtt_history") || "[]");
                await db.collection('users').doc(u.uid).set({
                  tasks: t, checks: c, history: h,
                  updatedAt: window.firebase.firestore.FieldValue.serverTimestamp()
                });
                setSyncStatus('synced');
              }
            } catch (e) {
              setSyncStatus('error');
            }
          } else {
            setSyncStatus('idle');
          }
        });
      }, []);

      useEffect(() => {
        if (skipNextSaveRef.current) {
          skipNextSaveRef.current = false;
          return;
        }
        if (!db || !userRef.current) return;
        clearTimeout(saveTimerRef.current);
        setSyncStatus('syncing');
        const uid = userRef.current.uid;
        saveTimerRef.current = setTimeout(async () => {
          try {
            await db.collection('users').doc(uid).set({
              tasks, checks, history,
              updatedAt: window.firebase.firestore.FieldValue.serverTimestamp()
            });
            setSyncStatus('synced');
          } catch {
            setSyncStatus('error');
          }
        }, 1500);
        return () => clearTimeout(saveTimerRef.current);
      }, [tasks, checks, history]);

      function addTask() {
        if (!newName.trim()) return;
        setTasks(prev => [...prev, { id: Date.now(), name: newName.trim(), target: Math.max(1, Math.min(7, Number(newTarget))) }]);
        setNewName("");
        setNewTarget(3);
      }

      function deleteTask(id) {
        setTasks(prev => prev.filter(t => t.id !== id));
        setChecks(prev => {
          const next = { ...prev };
          Object.keys(next).forEach(k => { if (k.startsWith(id + "_")) delete next[k]; });
          return next;
        });
      }

      function signIn() {
        if (!auth) return;
        auth.signInWithPopup(new window.firebase.auth.GoogleAuthProvider())
          .catch(e => console.warn('Sign-in failed:', e));
      }

      function signOut() {
        if (!auth) return;
        auth.signOut();
        setSyncStatus('idle');
      }

      function toggleDay(taskId, dayIdx) {
        const key = `${taskId}_${currentKey}_${dayIdx}`;
        setChecks(prev => ({ ...prev, [key]: !prev[key] }));
      }

      function getDayChecks(taskId) {
        return DAYS.map((_, i) => !!checks[`${taskId}_${currentKey}_${i}`]);
      }

      function getCount(taskId) {
        return getDayChecks(taskId).filter(Boolean).length;
      }

      const pastWeeks = [...new Set(
        Object.keys(checks).map(k => k.split("_")[1]).filter(w => w && w !== currentKey)
      )].sort().reverse().slice(0, 8);

      return (
        <div style={styles.wrap}>
          <div style={styles.header}>
            <h1 style={styles.h1}>Weekly tasks</h1>
            <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 4 }}>
              <span style={styles.weekLabel}>{formatWeekLabel(currentMonday)}</span>
              <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                {auth && (user ? (
                  <>
                    {syncStatus === 'synced' && <span style={{ fontSize: 11, color: "#1D9E75" }}>✓ Synced</span>}
                    {syncStatus === 'syncing' && <span style={{ fontSize: 11, color: "var(--color-text-tertiary)" }}>Syncing…</span>}
                    {syncStatus === 'error' && <span style={{ fontSize: 11, color: "#e05252" }}>⚠ Sync error</span>}
                    <button style={{ ...styles.btn, fontSize: 12, padding: "4px 10px" }} onClick={signOut}>Sign out</button>
                  </>
                ) : (
                  <button style={{ ...styles.btn, fontSize: 12, padding: "4px 10px" }} onClick={signIn}>Sign in to sync</button>
                ))}
                <button style={{ ...styles.btn, fontSize: 12, padding: "4px 10px" }} onClick={() => setViewingHistory(v => !v)}>
                  {viewingHistory ? "Current week" : "History"}
                </button>
              </div>
            </div>
          </div>

          {!viewingHistory ? (
            <>
              <div style={styles.addRow}>
                <input style={styles.input} placeholder="New task name..." value={newName}
                  onChange={e => setNewName(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && addTask()} />
                <input style={styles.numInput} type="number" min={1} max={7} value={newTarget}
                  onChange={e => setNewTarget(e.target.value)} title="Days per week" />
                <button style={styles.btn} onClick={addTask}>Add</button>
              </div>

              {tasks.length === 0 && <p style={styles.empty}>No tasks yet. Add one above.</p>}

              {tasks.map(task => {
                const dayChecks = getDayChecks(task.id);
                const count = dayChecks.filter(Boolean).length;
                const met = count >= task.target;
                return (
                  <div key={task.id} style={styles.card}>
                    <div style={styles.cardTop}>
                      <div>
                        <p style={styles.taskName}>{task.name}</p>
                        <p style={styles.target}>{task.target} days/week</p>
                      </div>
                      <button style={styles.deleteBtn} onClick={() => deleteTask(task.id)} title="Remove task">×</button>
                    </div>
                    <div style={styles.daysRow}>
                      {DAYS.map((d, i) => (
                        <button key={d} style={styles.dayBtn(dayChecks[i], met)} onClick={() => toggleDay(task.id, i)}>
                          {d}
                        </button>
                      ))}
                    </div>
                    <div style={styles.progressWrap}>
                      <div style={styles.progressBar((count / task.target) * 100, met)} />
                    </div>
                    <p style={styles.progressLabel}>{count} / {task.target} days {met ? "— done!" : ""}</p>
                  </div>
                );
              })}
            </>
          ) : (
            <div style={styles.historySection}>
              <p style={styles.historyH2}>Past weeks</p>
              {pastWeeks.length === 0 && <p style={styles.empty}>No history yet. Complete tasks this week to start tracking.</p>}
              {pastWeeks.map(wk => {
                const mon = new Date(wk + "T00:00:00");
                return (
                  <div key={wk}>
                    <p style={{ fontSize: 13, fontWeight: 500, color: "var(--color-text-secondary)", margin: "1rem 0 4px" }}>{formatWeekLabel(mon)}</p>
                    {tasks.map(task => {
                      const count = DAYS.reduce((acc, _, i) => acc + (!!checks[`${task.id}_${wk}_${i}`] ? 1 : 0), 0);
                      const met = count >= task.target;
                      if (count === 0) return null;
                      return (
                        <div key={task.id} style={styles.histRow}>
                          <span><span style={styles.dot(met)} />{task.name}</span>
                          <span style={{ color: met ? "#1D9E75" : "var(--color-text-secondary)" }}>{count}/{task.target}</span>
                        </div>
                      );
                    })}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
  </script>
</body>
</html>
